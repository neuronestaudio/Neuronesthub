<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroNest — Thank You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/page-transitions.css">
    <style>
        :root {
            --bg-dark: #000000;
            --text-white: #ffffff;
            --text-grey: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .thank-you-icon {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }

        .thank-you-icon svg {
            width: 36px;
            height: 36px;
            stroke: var(--text-white);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: clamp(28px, 5vw, 48px);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        p {
            font-family: 'Inter', sans-serif;
            color: var(--text-grey);
            font-size: 16px;
            max-width: 520px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--text-white);
            color: var(--text-white);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--text-white);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>
    <div class="thank-you-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>Thank You</h1>
    <p>Your submission has been received. We'll be in touch soon — welcome to the NeuroNest community.</p>
    <a href="index.html" class="btn">Back to Home</a>
    <script src="assets/page-transitions.js"></script>
</body>
</html>
